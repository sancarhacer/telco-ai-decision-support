<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telecom NOC Merkezi - Sohbet Asistanı</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <div id="siteHeader"></div>
  <main class="container">
    <header class="page-hero">
      <div>
        <p class="eyebrow">Sohbet Asistanı</p>
        <h1 class="page-title">Ağ olaylarını sohbet ile analiz edin</h1>
        <p class="page-description">
          Kök neden analizi, kanıt ve önerilen eylemler üretmek için MCP araç verilerini kullanır.
        </p>
      </div>
    </header>
    <div class="examples">
      <span class="example-label">Örnek sorgular:</span>
      <button class="example-btn" data-query="Buca'da herhangi bir anomali var mı?">Buca anomalileri</button>
      <button class="example-btn" data-query="CELL_017 için metrikleri göster">CELL_017 metrikleri</button>
      <button class="example-btn" data-query="Konak bölgesinde herhangi bir hata var mı?">Konak hataları</button>
    </div>
    <section id="chatBox" class="chat-box"></section>
    <form id="chatForm" class="chat-form">
      <input id="messageInput" type="text" placeholder="Sorgunuzu yazın... (ör. Buca'da anomali var mı?)" required />
      <input id="limitInput" type="number" min="1" max="200" value="20" title="Sonuç limiti" />
      <button type="submit">
        <span>Gönder</span>
        <span class="btn-icon">→</span>
      </button>
    </form>
  </main>
  <div id="siteFooter"></div>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/main.js"></script>
  <script src="./app.js"></script>
</body>
</html>
