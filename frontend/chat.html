<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Telecom NOC Center - Chat Analyst</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <div id="siteHeader"></div>

  <main class="container">
    <header class="page-hero">
      <div>
        <p class="eyebrow">Chat Analyst</p>
        <h1 class="page-title">Analyze network events through chat</h1>
        <p class="page-description">
          Uses MCP tool data to produce root cause analysis, evidence, and recommended actions.
        </p>
      </div>
    </header>

    <div class="examples">
      <span class="example-label">Example queries:</span>
      <button class="example-btn" data-query="Are there any anomalies in Buca?">Buca anomalies</button>
      <button class="example-btn" data-query="Show metrics for CELL_017">CELL_017 metrics</button>
      <button class="example-btn" data-query="Are there any faults in the Konak region?">Konak faults</button>
    </div>

    <section id="chatBox" class="chat-box"></section>

    <form id="chatForm" class="chat-form">
      <input id="messageInput" type="text" placeholder="Type your query... (e.g. Are there any anomalies in Buca?)" required />
      <input id="limitInput" type="number" min="1" max="200" value="20" title="Result limit" />
      <button type="submit">
        <span>Send</span>
        <span class="btn-icon">→</span>
      </button>
    </form>
  </main>

  <div id="siteFooter"></div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="./js/main.js"></script>
  <script src="./app.js"></script>
</body>

</html>
